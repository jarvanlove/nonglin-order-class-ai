<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>母版 · 内容页</title>
<link rel="stylesheet" href="tokens.css">
<link rel="stylesheet" href="animations.css">
<link rel="stylesheet" href="layout.css">
<link rel="stylesheet" href="components.css">
<style>
  .content-body {
    background: var(--bg);
  }

  /* 顶部装饰条 */
  .content-top-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: var(--top-bar-h);
    background: var(--primary);
    z-index: 100;
  }

  /* 顶部导航 */
  .content-header {
    position: absolute;
    top: var(--top-bar-h); left: 0; right: 0;
    height: var(--header-h);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 var(--content-pad-x);
    background: var(--bg-white);
    border-bottom: 1pt solid var(--border);
    z-index: 10;
  }

  .content-header .logo {
    height: 22pt;
    width: auto;
  }

  .content-header .page-meta {
    font-size: var(--text-2xs);
    color: var(--muted);
  }

  /* 章节标题栏 */
  .section-header-bar {
    display: flex;
    align-items: center;
    gap: var(--space-5);
    margin-bottom: var(--space-7);
  }

  .section-header-bar .section-title-box {
    background: var(--primary);
    color: var(--bg-white);
    padding: var(--space-4) var(--space-8);
    border-radius: 4pt;
    font-size: var(--text-3xl);
    font-weight: 700;
  }

  .section-header-bar .section-number {
    font-size: var(--text-3xl);
    font-weight: 700;
    color: var(--primary);
  }

  .section-header-bar .section-line {
    flex: 1;
    height: 3pt;
    background: var(--primary-dark);
    border-radius: 2pt;
  }

  /* 内容区 */
  .content-main {
    position: absolute;
    top: calc(var(--top-bar-h) + var(--header-h));
    bottom: var(--footer-h);
    left: 0; right: 0;
    padding: var(--content-pad-y) var(--content-pad-x);
    box-sizing: border-box;
    overflow: hidden;
  }

  /* 两栏内容 */
  .content-two-col {
    display: flex;
    gap: var(--space-6);
    height: calc(100% - 50pt);
  }

  .content-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: var(--space-5);
  }

  .content-block {
    background: var(--bg-white);
    border: 1pt solid var(--border);
    border-radius: 6pt;
    padding: var(--space-5);
    box-shadow: 0 1pt 4pt rgba(0,0,0,0.04);
  }

  .content-block h3 {
    font-size: var(--text-xl);
    color: var(--info);
    font-weight: 700;
    margin-bottom: var(--space-4);
  }

  .content-block p {
    font-size: var(--text-base);
    color: var(--light-ink);
    line-height: 1.7;
    margin: 0 0 var(--space-4) 0;
  }

  .content-block p:last-child {
    margin-bottom: 0;
  }

  .content-block ul {
    list-style: none;
    padding: 0;
    margin: 0;
  }

  .content-block ul li {
    font-size: var(--text-base);
    color: var(--light-ink);
    line-height: 1.7;
    padding-left: var(--space-6);
    position: relative;
    margin-bottom: var(--space-3);
  }

  .content-block ul li::before {
    content: "";
    position: absolute;
    left: 0; top: 8pt;
    width: 5pt; height: 5pt;
    border-radius: 50%;
    background: var(--primary);
  }

  /* 图片区 */
  .image-area {
    background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
    border: 2pt dashed var(--border);
    border-radius: 6pt;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100pt;
    color: var(--muted);
    font-size: var(--text-md);
  }

  .image-area img {
    max-width: 100%;
    max-height: 200pt;
    border-radius: 4pt;
  }

  /* 要点卡片 */
  .key-point {
    background: rgba(8,78,143,0.04);
    border-left: 3pt solid var(--primary);
    border-radius: 0 4pt 4pt 0;
    padding: var(--space-4) var(--space-5);
    margin-top: var(--space-4);
  }

  .key-point p {
    font-size: var(--text-base);
    color: var(--light-ink);
    line-height: 1.6;
    margin: 0;
  }

  .key-point .point-label {
    font-size: var(--text-xs);
    color: var(--primary);
    font-weight: 700;
    margin-bottom: var(--space-2);
  }

  /* 页脚 */
  .content-footer {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: var(--footer-h);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 var(--content-pad-x);
    background: var(--bg-white);
    border-top: 1pt solid var(--border);
    z-index: 10;
  }

  .content-footer p {
    font-size: var(--text-2xs);
    color: var(--muted);
    margin: 0;
  }

  /* 动画 */
  .section-header-bar {
    opacity: 0;
    animation: fadeInLeft 0.5s ease-out forwards;
  }
  .content-block:nth-child(1) {
    opacity: 0;
    animation: fadeInUp 0.5s ease-out 0.1s forwards;
  }
  .content-block:nth-child(2) {
    opacity: 0;
    animation: fadeInUp 0.5s ease-out 0.2s forwards;
  }
  .content-block:nth-child(3) {
    opacity: 0;
    animation: fadeInUp 0.5s ease-out 0.3s forwards;
  }
</style>
</head>
<body class="content-body">

  <!-- 顶部装饰条 -->
  <div class="content-top-bar"></div>

  <!-- 顶部导航 -->
  <div class="content-header">
    <img class="logo" src="media/image2.png" alt="公司 Logo">
    <p class="page-meta">Day X · 知识储备</p>
  </div>

  <!-- 内容区 -->
  <div class="content-main">
    <!-- 章节标题栏 -->
    <div class="section-header-bar">
      <div class="section-title-box">知识储备</div>
      <div class="section-number">01</div>
      <div class="section-line"></div>
    </div>

    <!-- 两栏内容 -->
    <div class="content-two-col">
      <div class="content-col">
        <div class="content-block">
          <h3>核心概念一</h3>
          <p>概念定义和背景介绍，2-3句话概括核心要点。</p>
          <ul>
            <li>要点 1：具体说明</li>
            <li>要点 2：具体说明</li>
            <li>要点 3：具体说明</li>
          </ul>
        </div>
        <div class="content-block">
          <h3>核心概念二</h3>
          <p>第二个核心概念的定义和解释。</p>
          <div class="key-point">
            <p class="point-label">关键要点</p>
            <p>这里是关键要点的总结，帮助学生抓住核心。</p>
          </div>
        </div>
      </div>
      <div class="content-col">
        <div class="content-block">
          <h3>示意图</h3>
          <div class="image-area">
            <p>[ 插图占位区 ]</p>
          </div>
        </div>
        <div class="content-block">
          <h3>对比总结</h3>
          <p>通过对比加深理解：</p>
          <ul>
            <li>传统方法：XXX</li>
            <li>AI 方法：XXX</li>
            <li>核心差异：XXX</li>
          </ul>
        </div>
      </div>
    </div>
  </div>

  <!-- 页脚 -->
  <div class="content-footer">
    <p>AI 智能体工具实训 · 农林高校 2026</p>
    <p>X / XX</p>
  </div>

</body>
</html>
