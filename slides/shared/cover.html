<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>母版 · 封面页</title>
<link rel="stylesheet" href="tokens.css">
<link rel="stylesheet" href="animations.css">
<link rel="stylesheet" href="layout.css">
<link rel="stylesheet" href="components.css">
<style>
  /* 封面页特有样式 */
  .cover-body {
    background: var(--bg);
  }

  /* 顶部装饰条 - 比内容页更粗 */
  .cover-top-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 6pt;
    background: var(--primary);
    z-index: 100;
  }

  /* 右侧装饰图形 */
  .deco-shape-right {
    position: absolute;
    right: 0; top: 0;
    width: 260pt; height: 540pt;
    background: var(--primary);
    clip-path: polygon(35% 0, 100% 0, 100% 100%, 0% 100%);
    z-index: 0;
  }

  .deco-circle-1 {
    position: absolute;
    right: 200pt; top: 110pt;
    width: 80pt; height: 80pt;
    background: var(--accent);
    border-radius: 50%;
    opacity: 0.15;
    z-index: 0;
  }

  .deco-circle-2 {
    position: absolute;
    right: 60pt; bottom: 90pt;
    width: 120pt; height: 120pt;
    background: var(--success);
    border-radius: 50%;
    opacity: 0.12;
    z-index: 0;
  }

  .deco-circle-3 {
    position: absolute;
    right: 140pt; top: 280pt;
    width: 40pt; height: 40pt;
    background: var(--primary-light);
    border-radius: 50%;
    opacity: 0.3;
    z-index: 0;
  }

  /* 主内容区 */
  .cover-hero {
    position: absolute;
    top: 90pt; left: 48pt;
    right: 300pt;
    z-index: 1;
  }

  .day-label {
    display: inline-flex;
    align-items: center;
    gap: var(--space-5);
    margin-bottom: var(--space-8);
  }

  .day-label .bar {
    width: 24pt; height: 3pt;
    background: var(--accent);
    border-radius: 2pt;
  }

  .day-label p {
    font-size: var(--text-md);
    color: var(--accent);
    font-weight: 700;
    letter-spacing: 0.08em;
    margin: 0;
  }

  .main-title {
    font-size: var(--text-4xl);
    font-weight: 700;
    color: var(--primary);
    line-height: 1.2;
    margin: 0 0 var(--space-7) 0;
  }

  .main-title .accent {
    color: var(--accent);
  }

  .sub-title {
    font-size: var(--text-lg);
    color: var(--light-ink);
    line-height: 1.6;
    margin: 0 0 var(--space-12) 0;
  }

  /* 底部信息 */
  .cover-bottom {
    position: absolute;
    bottom: 40pt; left: 48pt;
    right: 48pt;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    z-index: 1;
  }

  .cover-bottom p {
    font-size: var(--text-sm);
    color: var(--muted);
    line-height: 1.8;
    margin: 0;
  }

  /* Logo区 */
  .cover-logo {
    position: absolute;
    top: 20pt; left: 32pt;
    display: flex;
    align-items: center;
    gap: var(--space-5);
    z-index: 1;
  }

  .cover-logo img {
    height: 28pt;
    width: auto;
  }

  .cover-logo .logo-text {
    font-size: var(--text-sm);
    color: var(--primary);
    font-weight: 700;
    letter-spacing: 0.05em;
  }

  /* 课程标签 */
  .cover-tag {
    position: absolute;
    top: 22pt; right: 32pt;
    background: rgba(8,78,143,0.08);
    padding: var(--space-2) var(--space-5);
    border-radius: 999pt;
    font-size: var(--text-xs);
    color: var(--primary);
    font-weight: 500;
    z-index: 1;
  }

  /* 右侧插图区 */
  .cover-illustration {
    position: absolute;
    right: 20pt;
    top: 50%;
    transform: translateY(-50%);
    width: 240pt;
    height: auto;
    z-index: 1;
  }

  /* ===== 动画 ===== */
  .deco-shape-right {
    opacity: 0;
    animation: fadeInRight 0.8s ease-out forwards;
  }
  .deco-circle-1 {
    opacity: 0;
    animation: scaleIn 0.6s ease-out 0.3s forwards;
  }
  .deco-circle-2 {
    opacity: 0;
    animation: scaleIn 0.6s ease-out 0.4s forwards;
  }
  .deco-circle-3 {
    opacity: 0;
    animation: scaleIn 0.6s ease-out 0.5s forwards;
  }
  .cover-logo {
    opacity: 0;
    animation: fadeInDown 0.5s ease-out forwards;
  }
  .cover-tag {
    opacity: 0;
    animation: fadeInDown 0.5s ease-out 0.1s forwards;
  }
  .day-label {
    opacity: 0;
    animation: fadeInLeft 0.5s ease-out 0.2s forwards;
  }
  .main-title {
    opacity: 0;
    animation: fadeInUp 0.6s ease-out 0.3s forwards;
  }
  .sub-title {
    opacity: 0;
    animation: fadeInUp 0.5s ease-out 0.45s forwards;
  }
  .cover-bottom {
    opacity: 0;
    animation: fadeInUp 0.5s ease-out 0.6s forwards;
  }
  .cover-illustration {
    opacity: 0;
    animation: fadeInRight 0.7s ease-out 0.35s forwards;
  }
</style>
</head>
<body class="cover-body">

  <!-- 装饰层 -->
  <div class="cover-top-bar"></div>
  <div class="deco-shape-right"></div>
  <div class="deco-circle-1"></div>
  <div class="deco-circle-2"></div>
  <div class="deco-circle-3"></div>

  <!-- Logo -->
  <div class="cover-logo">
    <img src="media/image2.png" alt="公司 Logo">
    <p class="logo-text">AI 智能体工具实训</p>
  </div>

  <!-- 课程标签 -->
  <div class="cover-tag">
    <p>6 天集训 · 第 X 天</p>
  </div>

  <!-- 主标题区 -->
  <div class="cover-hero">
    <div class="day-label">
      <div class="bar"></div>
      <p>DAY XX</p>
    </div>
    <h1 class="main-title">课程主标题 <span class="accent">+</span> 副标题</h1>
    <p class="sub-title">课程描述文案，一句话概括今日核心内容</p>
  </div>

  <!-- 底部信息 -->
  <div class="cover-bottom">
    <div>
      <p>授课对象：农林高校应届毕业生</p>
      <p>授课时长：上午 3 小时 + 下午 3.5 小时</p>
    </div>
    <div style="text-align: right;">
      <p>2026 年 5 月</p>
      <p>主讲讲师</p>
    </div>
  </div>

  <!-- 右侧插图 -->
  <img class="cover-illustration" src="media/image1.png" alt="AI 插图">

</body>
</html>
