<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>母版 · 拓展页</title>
<link rel="stylesheet" href="tokens.css">
<link rel="stylesheet" href="animations.css">
<link rel="stylesheet" href="layout.css">
<link rel="stylesheet" href="components.css">
<style>
  .extension-body {
    background: var(--bg);
  }

  .extension-top-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: var(--top-bar-h);
    background: var(--primary);
    z-index: 100;
  }

  .extension-header {
    position: absolute;
    top: var(--top-bar-h); left: 0; right: 0;
    height: var(--header-h);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 var(--content-pad-x);
    background: var(--bg-white);
    border-bottom: 1pt solid var(--border);
    z-index: 10;
  }

  .extension-header .logo {
    height: 22pt;
    width: auto;
  }

  .extension-header .page-meta {
    font-size: var(--text-2xs);
    color: var(--muted);
  }

  .extension-content {
    position: absolute;
    top: calc(var(--top-bar-h) + var(--header-h));
    bottom: var(--footer-h);
    left: 0; right: 0;
    padding: var(--content-pad-y) var(--content-pad-x);
    box-sizing: border-box;
    overflow: hidden;
  }

  .section-header-bar {
    display: flex;
    align-items: center;
    gap: var(--space-5);
    margin-bottom: var(--space-6);
  }

  .section-header-bar .section-title-box {
    background: var(--primary);
    color: var(--bg-white);
    padding: var(--space-4) var(--space-8);
    border-radius: 4pt;
    font-size: var(--text-3xl);
    font-weight: 700;
  }

  .section-header-bar .section-number {
    font-size: var(--text-3xl);
    font-weight: 700;
    color: var(--primary);
  }

  .section-header-bar .section-line {
    flex: 1;
    height: 3pt;
    background: var(--primary-dark);
    border-radius: 2pt;
  }

  .extension-layout {
    display: flex;
    gap: var(--space-6);
    height: calc(100% - 50pt);
  }

  .extension-main {
    flex: 2;
    display: flex;
    flex-direction: column;
    gap: var(--space-5);
  }

  .extension-sidebar {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: var(--space-5);
  }

  .extension-card {
    background: var(--bg-white);
    border: 1pt solid var(--border);
    border-radius: 6pt;
    padding: var(--space-5);
    box-shadow: 0 1pt 4pt rgba(0,0,0,0.04);
  }

  .extension-card h3 {
    font-size: var(--text-xl);
    color: var(--info);
    font-weight: 700;
    margin-bottom: var(--space-4);
  }

  .extension-card p {
    font-size: var(--text-base);
    color: var(--light-ink);
    line-height: 1.7;
    margin: 0 0 var(--space-4) 0;
  }

  .extension-card p:last-child {
    margin-bottom: 0;
  }

  .think-box {
    background: rgba(238,130,47,0.06);
    border-left: 3pt solid var(--accent);
    border-radius: 0 4pt 4pt 0;
    padding: var(--space-4) var(--space-5);
  }

  .think-box .think-label {
    font-size: var(--text-xs);
    color: var(--accent);
    font-weight: 700;
    margin-bottom: var(--space-2);
  }

  .think-box p {
    font-size: var(--text-base);
    color: var(--light-ink);
    line-height: 1.6;
    margin: 0;
  }

  .resource-list {
    list-style: none;
    padding: 0;
    margin: 0;
  }

  .resource-list li {
    font-size: var(--text-base);
    color: var(--light-ink);
    line-height: 1.8;
    padding-left: var(--space-6);
    position: relative;
    margin-bottom: var(--space-3);
  }

  .resource-list li::before {
    content: "→";
    position: absolute;
    left: 0;
    color: var(--accent);
    font-weight: 700;
  }

  .extension-footer {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: var(--footer-h);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 var(--content-pad-x);
    background: var(--bg-white);
    border-top: 1pt solid var(--border);
    z-index: 10;
  }

  .extension-footer p {
    font-size: var(--text-2xs);
    color: var(--muted);
    margin: 0;
  }

  /* 动画 */
  .section-header-bar {
    opacity: 0;
    animation: fadeInLeft 0.5s ease-out forwards;
  }
  .extension-card:nth-child(1) {
    opacity: 0;
    animation: fadeInUp 0.5s ease-out 0.1s forwards;
  }
  .extension-card:nth-child(2) {
    opacity: 0;
    animation: fadeInUp 0.5s ease-out 0.2s forwards;
  }
</style>
</head>
<body class="extension-body">

  <div class="extension-top-bar"></div>

  <div class="extension-header">
    <img class="logo" src="media/image2.png" alt="公司 Logo">
    <p class="page-meta">Day X · 任务拓展</p>
  </div>

  <div class="extension-content">
    <div class="section-header-bar">
      <div class="section-title-box">任务拓展</div>
      <div class="section-number">04</div>
      <div class="section-line"></div>
    </div>

    <div class="extension-layout">
      <div class="extension-main">
        <div class="extension-card">
          <h3>进阶思考</h3>
          <p>在掌握了基础操作之后，让我们思考一些更深入的问题：</p>
          <div class="think-box">
            <p class="think-label">思考题 1</p>
            <p>如果场景换成 XXX，今天的方案还适用吗？需要做哪些调整？</p>
          </div>
        </div>

        <div class="extension-card">
          <h3>延伸案例</h3>
          <p>以下是一个真实场景中的应用案例，供参考：</p>
          <div class="think-box">
            <p class="think-label">案例：XXX</p>
            <p>案例描述，说明背景、挑战、解决方案和效果。2-3句话概括。</p>
          </div>
        </div>
      </div>

      <div class="extension-sidebar">
        <div class="extension-card">
          <h3>拓展资源</h3>
          <ul class="resource-list">
            <li>官方文档链接</li>
            <li>推荐视频教程</li>
            <li>相关论文/报告</li>
            <li>社区讨论帖</li>
          </ul>
        </div>

        <div class="extension-card">
          <h3>课后练习</h3>
          <p style="font-size: var(--text-base); color: var(--light-ink); line-height: 1.7; margin: 0;">
            尝试用今天学到的方法解决一个你自己遇到的真实问题，记录过程和结果。
          </p>
        </div>
      </div>
    </div>
  </div>

  <div class="extension-footer">
    <p>AI 智能体工具实训 · 农林高校 2026</p>
    <p>X / XX</p>
  </div>

</body>
</html>
