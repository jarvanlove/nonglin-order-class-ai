<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>母版 · 习题页</title>
<link rel="stylesheet" href="tokens.css">
<link rel="stylesheet" href="animations.css">
<link rel="stylesheet" href="layout.css">
<link rel="stylesheet" href="components.css">
<style>
  .quiz-body {
    background: var(--bg);
  }

  .quiz-top-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: var(--top-bar-h);
    background: var(--primary);
    z-index: 100;
  }

  .quiz-header {
    position: absolute;
    top: var(--top-bar-h); left: 0; right: 0;
    height: var(--header-h);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 var(--content-pad-x);
    background: var(--bg-white);
    border-bottom: 1pt solid var(--border);
    z-index: 10;
  }

  .quiz-header .logo {
    height: 22pt;
    width: auto;
  }

  .quiz-header .page-meta {
    font-size: var(--text-2xs);
    color: var(--muted);
  }

  .quiz-content {
    position: absolute;
    top: calc(var(--top-bar-h) + var(--header-h));
    bottom: var(--footer-h);
    left: 0; right: 0;
    padding: var(--content-pad-y) var(--content-pad-x);
    box-sizing: border-box;
    overflow: hidden;
  }

  .section-header-bar {
    display: flex;
    align-items: center;
    gap: var(--space-5);
    margin-bottom: var(--space-6);
  }

  .section-header-bar .section-title-box {
    background: var(--primary);
    color: var(--bg-white);
    padding: var(--space-4) var(--space-8);
    border-radius: 4pt;
    font-size: var(--text-3xl);
    font-weight: 700;
  }

  .section-header-bar .section-number {
    font-size: var(--text-3xl);
    font-weight: 700;
    color: var(--primary);
  }

  .section-header-bar .section-line {
    flex: 1;
    height: 3pt;
    background: var(--primary-dark);
    border-radius: 2pt;
  }

  .quiz-layout {
    display: flex;
    flex-direction: column;
    gap: var(--space-5);
    height: calc(100% - 50pt);
  }

  .quiz-card {
    background: var(--bg-white);
    border: 1pt solid var(--border);
    border-radius: 6pt;
    padding: var(--space-5);
    box-shadow: 0 1pt 4pt rgba(0,0,0,0.04);
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .quiz-card .quiz-num {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 26pt;
    height: 26pt;
    border-radius: 50%;
    background: var(--primary);
    color: var(--bg-white);
    font-size: var(--text-md);
    font-weight: 700;
    margin-bottom: var(--space-4);
  }

  .quiz-card h3 {
    font-size: var(--text-lg);
    color: var(--info);
    font-weight: 700;
    margin-bottom: var(--space-4);
  }

  .quiz-card p {
    font-size: var(--text-base);
    color: var(--light-ink);
    line-height: 1.7;
    margin: 0 0 var(--space-4) 0;
  }

  .quiz-options {
    list-style: none;
    padding: 0;
    margin: 0;
    flex: 1;
  }

  .quiz-options li {
    font-size: var(--text-base);
    color: var(--light-ink);
    line-height: 1.8;
    padding: var(--space-3) var(--space-5);
    margin-bottom: var(--space-3);
    background: rgba(8,78,143,0.02);
    border-radius: 4pt;
    border: 1pt solid transparent;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .quiz-options li:hover {
    border-color: var(--primary);
    background: rgba(8,78,143,0.04);
  }

  .quiz-options li .opt-label {
    display: inline-block;
    width: 20pt;
    height: 20pt;
    border-radius: 50%;
    background: var(--primary);
    color: var(--bg-white);
    font-size: var(--text-xs);
    font-weight: 700;
    text-align: center;
    line-height: 20pt;
    margin-right: var(--space-4);
  }

  .quiz-answer {
    background: rgba(117,189,66,0.06);
    border-left: 3pt solid var(--success);
    border-radius: 0 4pt 4pt 0;
    padding: var(--space-4) var(--space-5);
    margin-top: auto;
  }

  .quiz-answer .answer-label {
    font-size: var(--text-xs);
    color: var(--success);
    font-weight: 700;
    margin-bottom: var(--space-2);
  }

  .quiz-answer p {
    font-size: var(--text-base);
    color: var(--light-ink);
    line-height: 1.6;
    margin: 0;
  }

  .quiz-footer {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: var(--footer-h);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 var(--content-pad-x);
    background: var(--bg-white);
    border-top: 1pt solid var(--border);
    z-index: 10;
  }

  .quiz-footer p {
    font-size: var(--text-2xs);
    color: var(--muted);
    margin: 0;
  }

  /* 动画 */
  .section-header-bar {
    opacity: 0;
    animation: fadeInLeft 0.5s ease-out forwards;
  }
  .quiz-card:nth-child(1) {
    opacity: 0;
    animation: fadeInUp 0.5s ease-out 0.1s forwards;
  }
  .quiz-card:nth-child(2) {
    opacity: 0;
    animation: fadeInUp 0.5s ease-out 0.2s forwards;
  }
  .quiz-card:nth-child(3) {
    opacity: 0;
    animation: fadeInUp 0.5s ease-out 0.3s forwards;
  }
</style>
</head>
<body class="quiz-body">

  <div class="quiz-top-bar"></div>

  <div class="quiz-header">
    <img class="logo" src="media/image2.png" alt="公司 Logo">
    <p class="page-meta">Day X · 课堂习题</p>
  </div>

  <div class="quiz-content">
    <div class="section-header-bar">
      <div class="section-title-box">课堂习题</div>
      <div class="section-number">05</div>
      <div class="section-line"></div>
    </div>

    <div class="quiz-layout">
      <div class="quiz-card">
        <div class="quiz-num">1</div>
        <h3>选择题 / 判断题</h3>
        <p>题目描述文字，说明问题背景和要求。</p>
        <ul class="quiz-options">
          <li><span class="opt-label">A</span>选项 A 的内容</li>
          <li><span class="opt-label">B</span>选项 B 的内容</li>
          <li><span class="opt-label">C</span>选项 C 的内容</li>
          <li><span class="opt-label">D</span>选项 D 的内容</li>
        </ul>
        <div class="quiz-answer">
          <p class="answer-label">答案解析</p>
          <p>正确答案及简要解析。</p>
        </div>
      </div>

      <div class="quiz-card">
        <div class="quiz-num">2</div>
        <h3>简答题 / 操作题</h3>
        <p>题目描述文字，要求学生简述或操作。</p>
        <div class="quiz-answer">
          <p class="answer-label">参考答案要点</p>
          <p>1. 要点一  2. 要点二  3. 要点三</p>
        </div>
      </div>
    </div>
  </div>

  <div class="quiz-footer">
    <p>AI 智能体工具实训 · 农林高校 2026</p>
    <p>X / XX</p>
  </div>

</body>
</html>
