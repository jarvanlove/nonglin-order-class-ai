<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 40" width="200" height="40">
  <defs>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#75BD42"/>
      <stop offset="100%" stop-color="#5A9E2F"/>
    </linearGradient>
  </defs>

  <!-- Icon background circle -->
  <circle cx="19" cy="20" r="17" fill="#084E8F" opacity="0.08"/>

  <!-- Leaf shape -->
  <path d="M19 6
           C19 6, 28 14, 28 22
           C28 28, 24 32, 19 32
           C14 32, 10 28, 10 22
           C10 14, 19 6, 19 6Z"
        fill="url(#leafGrad)"/>

  <!-- Leaf vein -->
  <path d="M19 10 L19 28" stroke="#ffffff" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
  <path d="M19 16 L14 20" stroke="#ffffff" stroke-width="0.9" stroke-linecap="round" opacity="0.5"/>
  <path d="M19 20 L24 23" stroke="#ffffff" stroke-width="0.9" stroke-linecap="round" opacity="0.5"/>

  <!-- Circuit / AI nodes -->
  <circle cx="32" cy="12" r="2.5" fill="#084E8F"/>
  <circle cx="32" cy="28" r="2.5" fill="#084E8F"/>
  <line x1="28" y1="18" x2="32" y2="14" stroke="#084E8F" stroke-width="1" stroke-linecap="round"/>
  <line x1="28" y1="24" x2="32" y2="26" stroke="#084E8F" stroke-width="1" stroke-linecap="round"/>

  <!-- Text: AI实训 -->
  <text x="44" y="26" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="20" font-weight="700" fill="#084E8F" letter-spacing="0.05em">AI实训</text>

  <!-- Subtle accent line -->
  <line x1="44" y1="32" x2="108" y2="32" stroke="#75BD42" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
</svg>
